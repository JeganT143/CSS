<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>My first crafted element</title>
        <style>
            *,*::after,*::before {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body{
                font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
                background: #f5f4f0;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 40px;
            }

            .card{
                background: #ffffff;
                border-radius: 16px;
                border: 0.5px solid rgba(0,0,0,0.8);
                padding: 32px;
                max-width: 360px;
                width: 100%;
            }

            .eyebrow{
                font-size: 11px;
                font-weight: 500;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                color: #9ca3af;
                margin-bottom: 16px;
            }

            .title{
                font-size: 20px;
                font-weight: 500;
                color: #111827;
                line-height: 1.3;
                margin-bottom: 12px;
            }

            .body-text{
                font-size: 14px;
                color: #6b7280;
                line-height: 1.65;
                margin-bottom: 28px;
            }

            .cta{
                background: #111827;
                color: #ffffff;
                border: none;
                border-radius: 8px;
                padding: 12px 20px;
                font-size: 14px;
                font-weight: 500;
                cursor: pointer;
                width: 100%;
            }



        </style>
    </head>
    <body>
        <div class="card">
            <p class="eyebrow">Getting started</p>
            <h2 class="title"> The fundamentals, done right</h2>
            <p class="body-text">
                Good design starts with the box model.
                Every beautiful thing on the web is built 
                from rectangles with intention.
            </p>
            <button class="cta">Continue Learning</button>
        </div>
    </body>
</html>
