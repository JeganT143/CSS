<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Project 2 — Profile Card</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
        <style>
            *,*::before, *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body{
                font-family:'Inter', sans-serif;
                background:  #f5f4f0;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 40px;
            }

            .card{
                background: #ffffff;
                border-radius: 20px;
                border: 0.5px solid rgba(0, 0, 0, 0.8);
                padding: 32px;
                max-width: 340px;
                width: 100%;
                text-align: center;

            }

            .avatar{
                width: 72px;
                height: 72px;
                border-radius: 50%;
                background: #fef3c7;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 24px;
                font-weight: 600;
                color: #d97706;
                margin: 0 auto 16px;
            }

            .name{
                font-size: 20px;
                font-weight: 600;
                color: #111827;
                margin-bottom: 8px;
                letter-spacing: -0.02em;

            }

            .role{
                font-size: 13px;
                font-weight: 400;
                color: #9ca3af;
                margin-bottom: 16px;
            }

            .bio{
                font-size: 14px;
                line-height: 1.6;
                color: #6b7280;
                margin-bottom: 28px;;
            }
            .stats{
                display: flex;
                border-top: 0.5px solid rgba(0, 0, 0, 0.6);
                padding-top: 24px;
                gap: 0;
            }

            .stat{
                flex:1;
                display: flex;
                flex-direction: column;
                gap: 4px;
            }
            .stat-number{
                font-size: 20px;
                font-weight: 600;
                letter-spacing: -0.03em;
                color:#111827;
            }

            .stat-label{
                font-size: 11px;
                font-weight: 400;
                color: #9ca3af;
                letter-spacing: 0.04em;
                text-transform: uppercase;
            }

            .stat+.stat{
                border-left: 0.5px solid rgba(0, 0, 0, 0.6);
            }
        </style>      

    </head>
    <body>
        <div class="card">
            <div class="avatar">SR</div>
            <h2 class="name">Sarah Robinson</h2>
            <p class="role">Product Designer</p>
            <p class="bio">Sarah is a product designer with over 10 years of experience. She has a passion for creating intuitive and user-friendly designs.</p>
            <div class="stats">
               <div class="stat">
                    <span class="stat-number">150</span>
                    <span class="stat-label">Posts</span>
               </div> 
               <div class="stat">
                    <span class="stat-number">10K</span>
                    <span class="stat-label">Followers</span>
                </div>
                <div class="stat">
                    <span class="stat-number">500</span>
                    <span class="stat-label">Following</span>
                </div>
            </div>
        </div>

    </body>
</html>
