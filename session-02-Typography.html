<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session 02 - Typography</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body{
            font-family:"Inter", sans-serif;
            background: #f5f4f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .card{
            background: #ffffff;
            border-radius: 16px;
            border: 0.5px solid rgba(0,0,0,0.8);
            padding: 36px;
            width: 100%;
        }

        .eyebrow{
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #9ca3a9;
            margin-bottom: 14px;
        }

        .headline{
            font-size: 24px;
            font-weight: 500;
            line-height: 1.25;
            letter-spacing: -0.02em;
            margin-bottom: 12px;
        }

        .body-text{
            font-size: 14px;
            font-weight:  400;
            line-height: 1.65;
            color: #6b7280;
            margin-bottom: 28px;
        }
        .meta{
            font-size: 12px;
            font-weight: 400;
            color: #d1d5db;
            margin-bottom: 28px;
        }
        .cta{
            background: #111827;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            padding: 12px 20px;
            font-family: "Inter", sans-serif;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.01em;
            cursor: pointer;
            width: 100%;
        }


    </style>

</head>

</head>
<body>
    <div class="card">
        <p class="eyebrow"> Session 02: Typography </p>
        <h2 class="headline"> Four controls that change everything</h2>
        <p class="body-text">
            Size sets volume. Weights sets confidence.
            Line height gives text room to breathe.
            Letter spacing controls formality. 
            Master  these four and you control how anything feels.
        </p>
        <p class="meta"> Written by Hand, Understood by Eye</p>
        <button class="cta"> Continue to color theory</button>
    </div>

</body>
